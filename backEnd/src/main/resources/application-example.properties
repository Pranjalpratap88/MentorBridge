# ─────────────────────────────────────────────────────────────────────────────
# application-example.properties
# Copy this file to application.properties and fill in your own values.
# application.properties is git-ignored and must NEVER be committed.
# ─────────────────────────────────────────────────────────────────────────────

# Server
server.port=8080

# ── Database (MySQL) ──────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/YOUR_DB_NAME?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.web=INFO
logging.level.com.myanatomy.sandboxpro=DEBUG

# ── JWT ───────────────────────────────────────────────────────────────────────
# Generate a strong random secret (min 64 hex chars recommended)
app.jwt-secret=YOUR_JWT_SECRET_HERE
app.jwt-expiration=3600000
app.jwt-expiration-milliseconds=3600000

# ── Email (Gmail SMTP) ────────────────────────────────────────────────────────
# Use an App Password, not your real Gmail password
# https://support.google.com/accounts/answer/185833
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL_ADDRESS
spring.mail.password=YOUR_GMAIL_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ── Application URLs ──────────────────────────────────────────────────────────
app.frontend.url=http://localhost:5173
app.frontend-url=http://localhost:5173
app.otp.expiration=300000

# ── OAuth2 — Google ───────────────────────────────────────────────────────────
# Create credentials at https://console.cloud.google.com/
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

# ── OAuth2 — GitHub ───────────────────────────────────────────────────────────
# Create credentials at https://github.com/settings/developers
spring.security.oauth2.client.registration.github.client-id=YOUR_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=YOUR_GITHUB_CLIENT_SECRET
spring.security.oauth2.client.registration.github.scope=user:email,read:user
